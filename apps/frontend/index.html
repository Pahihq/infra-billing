<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Infra Billing</title>
    <script>
      // Pre-paint theming while the bundle loads: without this the empty body flashes
      // white on reload (always noticeable on /login, which is force-dark artwork).
      try {
        const s = localStorage.getItem('color-scheme');
        const dark =
          s === 'dark' || (s !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        if (location.pathname === '/login') {
          document.documentElement.style.backgroundColor = '#0a0a0c';
        }
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
